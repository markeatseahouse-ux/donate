<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - Donate Overlay</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.22) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.18) 0%, transparent 50%);
    }
    
    .auth-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }
    
    .auth-tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      gap: 15px;
    }
    
    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      box-shadow: none;
      color: var(--text-muted);
      padding: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      position: relative;
      transition: all 0.3s ease;
      text-transform: none;
      display: inline-block;
      text-align: center;
    }
    
    .auth-tab.active {
      color: #fff;
    }
    
    .auth-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--primary-gradient);
    }
    
    .auth-tab:hover {
      color: #fff;
      transform: none;
      box-shadow: none;
    }

    .form-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-subtitle {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 25px;
      text-align: center;
    }

    .error-msg {
      background: rgba(255, 0, 127, 0.1);
      border: 1px solid rgba(255, 0, 127, 0.3);
      color: #ff3366;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .success-msg {
      background: rgba(0, 255, 135, 0.1);
      border: 1px solid rgba(0, 255, 135, 0.3);
      color: #00ff87;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .input-icon-group {
      position: relative;
    }

    .input-icon-group input {
      padding-left: 42px;
    }

    .input-icon-group svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .info-box {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 5px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="glass-panel">
      
      <!-- Tabs -->
      <div class="auth-tabs">
        <button id="tab-login-btn" class="auth-tab active" onclick="switchAuthTab('login')">เข้าสู่ระบบ (Login)</button>
        <button id="tab-register-btn" class="auth-tab" onclick="switchAuthTab('register')">สมัครสตรีมเมอร์ (Register)</button>
      </div>

      <!-- Messages -->
      <div id="errorBox" class="error-msg"></div>
      <div id="successBox" class="success-msg"></div>

      <!-- Login Form -->
      <div id="login-form-wrapper">
        <div class="form-title">ยินดีต้อนรับกลับมา!</div>
        <div class="form-subtitle">เข้าสู่ระบบควบคุมแดชบอร์ดสตรีมเมอร์ส่วนตัวของคุณ</div>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="loginUser">ชื่อผู้ใช้งาน (Username)</label>
            <div class="input-icon-group">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="text" id="loginUser" placeholder="กรอก Username ของคุณ" required>
            </div>
          </div>
          
          <div class="form-group">
            <label for="loginPass">รหัสผ่าน (Password)</label>
            <div class="input-icon-group">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input type="password" id="loginPass" placeholder="กรอกรหัสผ่าน" required>
            </div>
          </div>
          
          <button type="submit" id="btnLoginSubmit" style="background: var(--primary-gradient);">
            เข้าสู่ระบบ
          </button>
        </form>
      </div>

      <!-- Register Form -->
      <div id="register-form-wrapper" style="display: none;">
        <div class="form-title">สมัครสมาชิกใหม่</div>
        <div class="form-subtitle">สร้างหน้าโดเนทและรับลิงก์วิดเจ็ตไปติดตั้งบน OBS ได้ฟรี</div>
        
        <form id="registerForm">
          <div class="form-group">
            <label for="registerUser">ชื่อผู้ใช้งานที่ต้องการ (Username)</label>
            <div class="input-icon-group">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="text" id="registerUser" placeholder="เช่น mark_seahouse" required>
            </div>
            <div class="info-box">
              ⚠️ ภาษาอังกฤษตัวเล็ก ตัวเลข เครื่องหมาย _ หรือ - ความยาวขั้นต่ำ 3 อักษร (ใช้เป็นลิงก์ช่องคุณ)
            </div>
          </div>
          
          <div class="form-group">
            <label for="registerPass">กำหนดรหัสผ่าน (Password)</label>
            <div class="input-icon-group">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input type="password" id="registerPass" placeholder="กำหนดรหัสผ่านเข้าใช้งาน" required>
            </div>
          </div>
          
          <button type="submit" id="btnRegisterSubmit" style="background: var(--secondary-gradient); box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);">
            สร้างบัญชีสตรีมเมอร์
          </button>
        </form>
      </div>

    </div>
  </div>

  <script>
    // Check if user already logged in
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/auth/me?t=' + Date.now());
        if (response.ok) {
          window.location.href = '/admin.html';
        }
      } catch (err) {}
    });

    function switchAuthTab(mode) {
      // Toggle tab active styles
      const tabLogin = document.getElementById('tab-login-btn');
      const tabRegister = document.getElementById('tab-register-btn');
      const loginForm = document.getElementById('login-form-wrapper');
      const registerForm = document.getElementById('register-form-wrapper');
      const errorBox = document.getElementById('errorBox');
      const successBox = document.getElementById('successBox');

      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      if (mode === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      } else {
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
      }
    }

    // Forms Handlers
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUser').value;
      const password = document.getElementById('loginPass').value;
      const btn = document.getElementById('btnLoginSubmit');
      const errorBox = document.getElementById('errorBox');

      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.innerText = 'กำลังตรวจสอบข้อมูล...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        
        if (response.ok && data.success) {
          window.location.href = '/admin.html';
        } else {
          errorBox.innerText = data.error || 'การเข้าสู่ระบบล้มเหลว';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.innerText = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerText = 'เข้าสู่ระบบ';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('registerUser').value;
      const password = document.getElementById('registerPass').value;
      const btn = document.getElementById('btnRegisterSubmit');
      const errorBox = document.getElementById('errorBox');
      const successBox = document.getElementById('successBox');

      errorBox.style.display = 'none';
      successBox.style.display = 'none';
      btn.disabled = true;
      btn.innerText = 'กำลังสร้างบัญชีใหม่...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        
        if (response.ok && data.success) {
          successBox.innerText = 'สมัครสมาชิกและเตรียมข้อมูลแดชบอร์ดเสร็จสมบูรณ์! กำลังนำทาง...';
          successBox.style.display = 'block';
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 1500);
        } else {
          errorBox.innerText = data.error || 'การสมัครสมาชิกล้มเหลว';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.innerText = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerText = 'สร้างบัญชีสตรีมเมอร์';
      }
    });
  </script>
</body>
</html>
