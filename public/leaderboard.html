<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Supporters Leaderboard Widget</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .leaderboard-container {
      width: 320px;
      background: rgba(16, 12, 36, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      padding: 16px;
      color: #fff;
    }

    .leaderboard-header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .leaderboard-title {
      font-size: 13.5px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #00f2fe;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13.5px;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease forwards;
    }

    .leaderboard-row.rank-1 {
      border-color: rgba(255, 215, 0, 0.3);
      background: rgba(255, 215, 0, 0.06);
    }

    .leaderboard-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rank-num {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    .rank-1 .rank-num {
      background: #ffd700;
      color: #11071a;
    }
    .rank-2 .rank-num {
      background: #c0c0c0;
      color: #11071a;
    }
    .rank-3 .rank-num {
      background: #cd7f32;
      color: #fff;
    }

    .supporter-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .supporter-amount {
      font-weight: 800;
      color: #00ff87;
      text-shadow: 0 0 8px rgba(0, 255, 135, 0.2);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.4));">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
      </svg>
      <span class="leaderboard-title">Top Supporters</span>
    </div>

    <div class="leaderboard-list" id="leaderboardList">
      <!-- Loaded dynamically -->
      <div style="text-align: center; color: rgba(255,255,255,0.4); padding: 15px 0; font-size:12.5px;">
        กำลังดึงอันดับ...
      </div>
    </div>
  </div>

  <script>
    let socket;
    
    function getTargetUsername() {
      const pathParts = window.location.pathname.split('/').filter(p => p.length > 0);
      let username = pathParts[0] || 'admin';
      return username.toLowerCase();
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSocket();
      fetchLeaderboard();
    });

    function initSocket() {
      socket = io();
      socket.on('connect', () => {
        socket.emit('join-room', getTargetUsername());
      });
      // Refresh rankings automatically when a donation is approved/paid
      socket.on('donation-alert', () => {
        setTimeout(fetchLeaderboard, 1000);
      });
      socket.on('goal-update', () => {
        setTimeout(fetchLeaderboard, 1000);
      });
    }

    async function fetchLeaderboard() {
      try {
        const username = getTargetUsername();
        const leaderboardRes = await fetch(`/api/leaderboard?username=${username}&t=${Date.now()}`);
        if (!leaderboardRes.ok) return;

        const topDonators = await leaderboardRes.json();
        renderList(topDonators);
      } catch (err) {
        console.error('Error fetching leaderboard:', err);
      }
    }

    function renderList(list) {
      const container = document.getElementById('leaderboardList');
      container.innerHTML = '';

      if (list.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; color: rgba(255,255,255,0.4); padding: 15px 0; font-size:12.5px;">
            ยังไม่มีผู้สนับสนุนในปัจจุบัน
          </div>
        `;
        return;
      }

      list.slice(0, 5).forEach((item, index) => {
        const rank = index + 1;
        const div = document.createElement('div');
        div.className = `leaderboard-row rank-${rank}`;
        div.style.animationDelay = `${index * 0.05}s`;

        div.innerHTML = `
          <div class="leaderboard-left">
            <span class="rank-num">${rank}</span>
            <span class="supporter-name">${escapeHtml(item.name)}</span>
          </div>
          <span class="supporter-amount">${item.amount.toLocaleString('th-TH')} ฿</span>
        `;
        container.appendChild(div);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
